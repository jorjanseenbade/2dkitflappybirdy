    .spinner {
      border-radius: 50%;
      width: 50px; height: 50px;
      position: absolute;
      left: 50%; top: 50%;
      margin: -25px 0 0 -25px;
      border: 5px solid #333;
      border-bottom-color: #fff;
      animation: spin 1s infinite linear, fade 1s ease-in;
    }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
